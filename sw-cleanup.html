<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZETA 2 CYPHER RESET</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f6f6f3;color:#1d211d;margin:0;padding:32px}
    main{max-width:560px;margin:auto;background:#fff;border:1px solid #d8ddd6;border-radius:16px;padding:24px}
    a{color:#176b38;font-weight:700}
  </style>
</head>
<body>
  <main>
    <h1>Reset</h1>
    <p id="status">Running...</p>
    <p><a href="/">Back</a></p>
  </main>
  <script>
    (async()=>{
      try{
        if('serviceWorker' in navigator){
          const regs=await navigator.serviceWorker.getRegistrations();
          for(const reg of regs) await reg.unregister();
        }
        if('caches' in window){
          const keys=await caches.keys();
          await Promise.all(keys.map(k=>caches.delete(k)));
        }
        document.getElementById('status').textContent='Done';
      }catch(e){document.getElementById('status').textContent='Error';}
    })();
  </script>
</body>
</html>
